[tool.pytest.ini_options]
asyncio_mode = "strict"
testpaths = [
    "tests/test_certificate.py",
    "tests/test_dtls_server.py",
    "tests/test_entertainment.py",
    "tests/test_hue_api.py",
    "tests/test_discovery.py",
    "tests/test_user_store.py",
    "tests/test_e2e.py",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]
